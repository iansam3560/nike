{% extends "base.html" %}

{% block content %}

<h1>Admin Dashboard</h1>

<a href="/add-product" class="btn btn-success mb-3">
Add Product
</a>

<table class="table table-bordered">

<tr>

<th>ID</th>
<th>Name</th>
<th>Price</th>

</tr>

{% for product in products %}

<tr>

<td>{{ product.id }}</td>

<td>{{ product.name }}</td>

<td>${{ product.price }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
